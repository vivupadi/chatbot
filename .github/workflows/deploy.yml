name: Build and Deploy to Kubernetes

# When to trigger this workflow
on:
  push:
    branches:
      - main              # Trigger on push to main
  workflow_dispatch:      # Allow manual trigger from GitHub UI

# Define the job
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  
    
    steps:
      # STEP 1: Get the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
        
      # STEP 2: SSH to server and build/deploy
      - name: Deploy to Hetzner Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          # From GitHub Secrets
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m

          
          # Commands to run on server
          script: |
            echo "=== Starting deployment ==="
            
            # Navigate to your project directory
            cd /root/chatbot
            
            # Pull latest code from GitHub
            echo "#### Pulling latest code ######"
            git pull origin main
            
            # Pre-build cleanup (start fresh)
            echo "🧹 Pre-build cleanup..."
            docker builder prune -af
            docker image prune -af
            df -h / | grep -v tmp

            # Login to Docker Hub
            echo "🔐 Logging into Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Build backend image
            echo "🏗️ Building backend image..."
            docker build -f Dockerfile.backend -t vivupadi/rag-backend:latest .

            # Clean up immediately after build to free space
            docker builder prune -f
            docker image prune -f
            
            # Build frontend image
            echo "🏗️ Building frontend image..."
            docker build -f Dockerfile.frontend -t vivupadi/rag-frontend:latest .

            # Clean up after frontend
            docker builder prune -f

            
            # Build db-update image (optional)
            echo "🏗️ Building db-update image..."
            docker build -f Dockerfile.db-update -t vivupadi/rag-db-update:latest .

            # Clean up after db-update
            docker builder prune -f
            
            # Push images to Docker Hub
            echo "📤 Pushing images to Docker Hub..."
            docker push vivupadi/rag-backend:latest
            docker push vivupadi/rag-frontend:latest
            docker push vivupadi/rag-db-update:latest
            
            # Update Kubernetes deployments
            echo "🔄 Restarting Kubernetes deployments..."
            kubectl rollout restart deployment/rag-backend -n rag-dev
            kubectl rollout restart deployment/frontend -n rag-dev
            
            # Wait for rollout to complete
            echo "⏳ Waiting for deployments to complete..."
            kubectl rollout status deployment/rag-backend -n rag-dev --timeout=5m
            kubectl rollout status deployment/frontend -n rag-dev --timeout=5m
            
            echo "✅ Deployment complete!"
            
      # STEP 3: Notify on failure (optional)
      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed! Check the logs above."